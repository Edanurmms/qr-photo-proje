<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Beyza Nişan</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="app.js"></script>
</head>
<body>
  <!-- Üst kısım (GIF arka plan) -->
  <div class="header"></div>

  <div class="container">
    <h1>Beyza&Hasan Nişan Fotoğrafları</h1>

    <!-- Yükleme bölümü -->
    <div class="card">
      <h2>Fotoğraf Yükle</h2>
      <input type="text" id="nameInput" placeholder="İsim Soyisim">
      <input type="file" id="photoInput">
      <div id="preview" class="preview"></div>
      <button class="btn" onclick="handleUpload()">Yükle</button>
    </div>

    <!-- Dosya listeleme bölümü -->
    <div class="card">
      <h2>Dosyalar</h2>
      <button class="btn2"onclick="handleList()">Listele</button>
      <div id="fileList" class="file-list"></div>
    </div>
  </div>
</body>
</html>
